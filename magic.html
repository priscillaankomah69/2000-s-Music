}

.album img{
width:150px;
height:150px;
border-radius:50%;
animation:spin 4s linear infinite;
}

.name{
margin-top:8px;
font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
}
.play{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#1db954;
width:50px;
height:50px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
opacity:0;
}

.album:hover .play{
opacity:1;
}
@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}
@keyframes move {

  to { left: 1150px; }
